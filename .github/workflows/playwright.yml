name: Playwright & k6 Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore Allure history from gh-pages
        if: always()
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/gh-pages; then
            git checkout origin/gh-pages -- history 2>/dev/null || true
            mkdir -p allure-results
            cp -r history allure-results/history 2>/dev/null || true
            echo "Allure history restored"
          else
            echo "No previous history found, starting fresh"
          fi

      - name: Run Playwright tests
        run: npx playwright test

      - name: Generate Allure report with history
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Copy history into report for next run
        if: always()
        run: cp -r allure-report/history allure-results/history 2>/dev/null || true

      - name: Upload Allure results (raw)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          keep_files: false

  k6:
    name: k6 Load Tests (5 VUs)
    runs-on: ubuntu-latest
    needs: [playwright]

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 homepage load test
        run: k6 run --out json=k6-results.json k6/homepage-load.js

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-results.json
          retention-days: 30
